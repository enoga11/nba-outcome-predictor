<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NBA Predictor</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 0.25rem;
            font-size: 2.5rem;
        }

        .subtitle {
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #cbd5e1;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 2rem;
            width: 100%;
            max-width: 760px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
        }

        .team-row {
            display: flex;
            gap: 1rem;
            align-items: end;
            flex-wrap: wrap;
        }

        .team-block {
            flex: 1;
            min-width: 220px;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
            font-weight: bold;
        }

        .select-wrap {
            position: relative;
        }

        select {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            background: white;
            color: #111827;
            appearance: none;
        }

        .vs {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fbbf24;
            padding-bottom: 0.7rem;
        }

        button {
            margin-top: 1.5rem;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            background: #f59e0b;
            color: #111827;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .result {
            margin-top: 1.5rem;
            display: none;
        }

        .result.show {
            display: block;
        }

        .winner {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #fbbf24;
        }

        .prob-row {
            display: flex;
            justify-content: space-between;
            margin: 0.4rem 0;
            color: #e2e8f0;
        }

        .bar-track {
            width: 100%;
            height: 14px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .bar-fill {
            height: 100%;
            background: #22c55e;
            width: 0%;
            transition: width 0.4s ease;
        }

        .error {
            color: #fecaca;
            margin-top: 1rem;
            font-size: 0.85rem;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>

<body>
    <h1>NBA Predictor</h1>
    <p class="subtitle">AI-Powered Predictions</p>
    <p class="subtitle" id="dataStatus">Loading data source…</p>

    <div class="card">
        <div class="team-row">
            <div class="team-block">
                <label>Home Team</label>
                <div class="select-wrap">
                    <select id="homeTeam">
                        <option value="">Select team…</option>
                    </select>
                </div>
            </div>
            <div class="vs">VS</div>
            <div class="team-block">
                <label>Away Team</label>
                <div class="select-wrap">
                    <select id="awayTeam">
                        <option value="">Select team…</option>
                    </select>
                </div>
            </div>
        </div>

        <button id="predictBtn" onclick="predict()">Predict Winner</button>
        <p class="error" id="errorMsg"></p>

        <div class="result" id="result">
            <div class="winner" id="winnerText"></div>
            <div class="prob-row"><span id="homeLabel"></span><span id="homeProb"></span></div>
            <div class="bar-track">
                <div class="bar-fill" id="homeBar"></div>
            </div>
            <div class="prob-row"><span id="awayLabel"></span><span id="awayProb"></span></div>
            <div class="bar-track">
                <div class="bar-fill" id="awayBar"></div>
            </div>
        </div>
    </div>

    <script>
        const TEAMS = [
            "Atlanta Hawks", "Boston Celtics", "Brooklyn Nets", "Charlotte Hornets",
            "Chicago Bulls", "Cleveland Cavaliers", "Dallas Mavericks", "Denver Nuggets",
            "Detroit Pistons", "Golden State Warriors", "Houston Rockets", "Indiana Pacers",
            "Los Angeles Clippers", "Los Angeles Lakers", "Memphis Grizzlies", "Miami Heat",
            "Milwaukee Bucks", "Minnesota Timberwolves", "New Orleans Pelicans", "New York Knicks",
            "Oklahoma City Thunder", "Orlando Magic", "Philadelphia 76ers", "Phoenix Suns",
            "Portland Trail Blazers", "Sacramento Kings", "San Antonio Spurs", "Toronto Raptors",
            "Utah Jazz", "Washington Wizards"
        ];
        ["homeTeam", "awayTeam"].forEach(id => {
            const sel = document.getElementById(id);
            TEAMS.forEach(t => { const o = document.createElement("option"); o.value = o.text = t; sel.add(o); });
        });

        async function loadStatus() {
            const statusEl = document.getElementById("dataStatus");
            try {
                const resp = await fetch("/api/status");
                if (!resp.ok) throw new Error();
                const data = await resp.json();
                const latest = data.latest_game_date ? ` • latest game: ${data.latest_game_date}` : "";
                statusEl.textContent = `Data source: ${data.data_source}${latest}`;
            } catch {
                statusEl.textContent = "Data source unavailable";
            }
        }

        async function predict() {
            const homeTeam = document.getElementById("homeTeam").value;
            const awayTeam = document.getElementById("awayTeam").value;
            const btn = document.getElementById("predictBtn");
            const err = document.getElementById("errorMsg");
            const res = document.getElementById("result");

            err.className = "error"; res.className = "result";
            if (!homeTeam || !awayTeam) { err.textContent = "Please select both teams."; err.className = "error show"; return; }
            if (homeTeam === awayTeam) { err.textContent = "Home and away teams must be different."; err.className = "error show"; return; }

            btn.disabled = true; btn.textContent = "Predicting…";
            try {
                const resp = await fetch("/api/predict", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ home_team: homeTeam, away_team: awayTeam })
                });
                if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || "Prediction failed"); }
                const data = await resp.json();

                document.getElementById("winnerText").textContent = `🏆 ${data.winner}`;
                document.getElementById("homeLabel").textContent = homeTeam;
                document.getElementById("awayLabel").textContent = awayTeam;
                document.getElementById("homeProb").textContent = `${(data.home_win_prob * 100).toFixed(1)}%`;
                document.getElementById("awayProb").textContent = `${(data.away_win_prob * 100).toFixed(1)}%`;
                document.getElementById("homeBar").style.width = `${data.home_win_prob * 100}%`;
                document.getElementById("awayBar").style.width = `${data.away_win_prob * 100}%`;
                res.className = "result show";
            } catch (e) {
                err.textContent = e.message; err.className = "error show";
            } finally {
                btn.disabled = false; btn.textContent = "Predict Winner";
            }
        }
        loadStatus();
    </script>
</body>

</html>
